    OpCommittedPayload:
      type: object
      description: 'Authoritative result of a persistent operation after backend validation and C++ solver recalculation.


        A client may optimistically solve the same operation locally for preview, but this payload is the canonical result.

        The client must apply `patch` to reconcile its local state. The patch is intentionally sparse: it should contain

        only entities, constraints, dimensions and materialized geometry that changed or were affected by the solver.

        '
      required:
      - opId
      - version
      - actorUserId
      - op
      - patch
      - solveStatus
      - affectedEntityIds
      - authoritative
      properties:
        opId:
          type: string
          description: Server-side persistent operation id.
        version:
          type: integer
          format: int64
          description: Committed sketch version after applying this operation and solver patch.
        actorUserId:
          type: string
          description: User that submitted the operation.
        actorUserName:
          type: string
          description: preferred_username for the user that submitted the operation, when known.
        clientOpId:
          type: string
          description: Client-generated id used to match this commit with a local optimistic operation.
        op:
          $ref: '#/components/schemas/SketchOperation'
        patch:
          $ref: '#/components/schemas/SketchPatch'
        solveStatus:
          $ref: '#/components/schemas/SolveStatus'
        affectedEntityIds:
          type: array
          description: Entity ids that were changed or touched by the authoritative solver result.
          items:
            type: string
        affectedConstraintIds:
          type: array
          description: Constraint ids that participated in or were affected by the solver recalculation.
          items:
            type: string
        affectedDimensionIds:
          type: array
          description: Dimension ids that participated in or were affected by the solver recalculation.
          items:
            type: string
        affectedComponentIds:
          type: array
          description: Constraint component ids recalculated by the solver.
          items:
            type: string
        authoritative:
          type: boolean
          const: true
          description: Must be true. Marks this payload as the backend/C++ solver source of truth, not a client preview.
    OpRejectedMessage:
      type: object
      required:
      - type
      - sketchId
      - serverTime
      - payload
      properties:
        type:
          type: string
          enum:
          - op.rejected
        requestId:
          type: string
        sketchId:
          type: string
        serverTime:
          type: string
          format: date-time
        payload:
          $ref: '#/components/schemas/OpRejectedPayload'
    OpRejectedPayload:
      type: object
      required:
      - clientOpId
