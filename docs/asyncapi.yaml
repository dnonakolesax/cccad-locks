          type: integer
          format: int64
        actorUserId:
          type: string
        actorUserName:
          type: string
        clientOpId:
          type: string
        createdAt:
          type: string
          format: date-time
        op:
          $ref: '#/components/schemas/SketchOperation'
    SketchOperation:
      type: object
      required:
      - type
      description: 'Persistent sketch operation. Concrete shape is selected by the type field. Discriminator is intentionally
        avoided for better AsyncAPI tooling compatibility.

        For type UpdateFillet, featureId and radius are required. The backend must update the existing fillet feature
        parameter, rerun the solver, and emit an authoritative op.committed.patch containing the changed fillet feature
        and affected materialized geometry. UpdateFillet must not create a new feature, and clients must not send
        createdPoint1Id, createdPoint2Id, or createdArcId for this operation.

        For type UpdateChamfer, featureId, distance1, and distance2 are required. The backend must update the existing
        chamfer feature parameters, rerun the solver, and emit an authoritative op.committed.patch containing the changed
        chamfer feature and affected materialized geometry. UpdateChamfer must not create a new feature, and clients must
        not send createdPoint1Id, createdPoint2Id, or createdLineId for this operation.

        '
      properties:
        type:
          type: string
          enum:
          - create_point
          - create_line
          - create_circle
          - create_arc
          - create_polyline
          - create_rectangle
          - ApplyFillet
          - UpdateFillet
          - ApplyChamfer
          - UpdateChamfer
          - set_entity_construction
          - split_entity
          - break_entity_at_point
          - trim_entity
          - extend_entity
          - mirror_entities
          - linear_pattern
          - circular_pattern
          - move_point
          - delete_entity
          - add_constraint
          - remove_constraint
          - add_dimension
          - set_dimension_value
          - remove_dimension
        x:
          type: number
          format: double
        y:
          type: number
          format: double
        pointId:
          type: string
        entityId:
          type: string
        opId:
          type: string
        featureId:
          type: string
        line1Id:
          type: string
        line2Id:
          type: string
        cornerPointId:
          type: string
        createdPoint1Id:
          type: string
