asyncapi: 3.1.0
info:
  title: cccAD Realtime Collaboration API
  version: 1.0.0
  description: |
    WebSocket protocol for cccAD collaborative 2D sketch editing.

    REST OpenAPI is used for initial document loading and regular HTTP commands.
    This AsyncAPI document describes realtime WebSocket messages.

    Rules:
      - PostgreSQL sketch operation log is the persistent source of truth.
      - op.committed is the only realtime event after which a client mutates real document state.
      - presence.*, drag.preview, session ping/pong and locks are transient.
      - Redis may be used for presence, locks and pub/sub fanout.
      - S3 is used for previews, exports, imports and large snapshots, not live sketch state.

defaultContentType: application/json

servers:
  local:
    host: localhost:8080
    protocol: ws
    pathname: /api/v1/sketches/{sketchId}/ws
    description: Local development server.
    variables:
      sketchId:
        default: sk_example
        description: Sketch identifier.
  production:
    host: api.cccad.example.com
    protocol: wss
    pathname: /api/v1/sketches/{sketchId}/ws
    description: Production server.
    variables:
      sketchId:
        default: sk_example
        description: Sketch identifier.

channels:
  sketchRealtime:
    address: /api/v1/sketches/{sketchId}/ws
    description: |
      Bidirectional WebSocket channel for one sketch document.

      Client should first load initial state through REST:
        GET /api/v1/sketches/{sketchId}

      Then it should connect to this WebSocket and send session.join.
    parameters:
      sketchId:
        description: Sketch identifier from the URL path.
    messages:
      SessionJoin:
        $ref: '#/components/messages/SessionJoin'
      SessionJoined:
        $ref: '#/components/messages/SessionJoined'
      SessionUserJoined:
        $ref: '#/components/messages/SessionUserJoined'
      SessionUserLeft:
        $ref: '#/components/messages/SessionUserLeft'
      SessionPing:
        $ref: '#/components/messages/SessionPing'
      SessionPong:
        $ref: '#/components/messages/SessionPong'
      SessionAccessRevoked:
        $ref: '#/components/messages/SessionAccessRevoked'
      PresenceCursor:
        $ref: '#/components/messages/PresenceCursor'
      PresenceSelection:
        $ref: '#/components/messages/PresenceSelection'
      PresenceHover:
        $ref: '#/components/messages/PresenceHover'
      PresenceTool:
        $ref: '#/components/messages/PresenceTool'
      DragBegin:
        $ref: '#/components/messages/DragBegin'
      DragBeginAccepted:
        $ref: '#/components/messages/DragBeginAccepted'
      DragBeginRejected:
        $ref: '#/components/messages/DragBeginRejected'
      DragPreview:
        $ref: '#/components/messages/DragPreview'
      DragCommit:
        $ref: '#/components/messages/DragCommit'
      DragCancel:
        $ref: '#/components/messages/DragCancel'
      DragCancelled:
        $ref: '#/components/messages/DragCancelled'
      OpSubmit:
        $ref: '#/components/messages/OpSubmit'
      OpCommitted:
        $ref: '#/components/messages/OpCommitted'
      OpRejected:
        $ref: '#/components/messages/OpRejected'
      OpsBatch:
        $ref: '#/components/messages/OpsBatch'
      LockAcquire:
        $ref: '#/components/messages/LockAcquire'
      LockAcquired:
        $ref: '#/components/messages/LockAcquired'
      LockRejected:
        $ref: '#/components/messages/LockRejected'
      LockRefresh:
        $ref: '#/components/messages/LockRefresh'
      LockRefreshed:
        $ref: '#/components/messages/LockRefreshed'
      LockRelease:
        $ref: '#/components/messages/LockRelease'
      LockReleased:
        $ref: '#/components/messages/LockReleased'
      StateResyncRequired:
        $ref: '#/components/messages/StateResyncRequired'
      StateSnapshot:
        $ref: '#/components/messages/StateSnapshot'
      StatePatch:
        $ref: '#/components/messages/StatePatch'
      PermissionUpdated:
        $ref: '#/components/messages/PermissionUpdated'
      PermissionRevoked:
        $ref: '#/components/messages/PermissionRevoked'
      ConflictCreated:
        $ref: '#/components/messages/ConflictCreated'
      ConflictResolved:
        $ref: '#/components/messages/ConflictResolved'
      Error:
        $ref: '#/components/messages/Error'

operations:
  joinSession:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Join realtime sketch session
    messages:
      - $ref: '#/channels/sketchRealtime/messages/SessionJoin'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
        - $ref: '#/channels/sketchRealtime/messages/SessionJoined'
        - $ref: '#/channels/sketchRealtime/messages/Error'
  heartbeat:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Heartbeat ping
    messages:
      - $ref: '#/channels/sketchRealtime/messages/SessionPing'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
        - $ref: '#/channels/sketchRealtime/messages/SessionPong'
        - $ref: '#/channels/sketchRealtime/messages/Error'
  sendPresence:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Send transient presence events
    messages:
      - $ref: '#/channels/sketchRealtime/messages/PresenceCursor'
      - $ref: '#/channels/sketchRealtime/messages/PresenceSelection'
      - $ref: '#/channels/sketchRealtime/messages/PresenceHover'
      - $ref: '#/channels/sketchRealtime/messages/PresenceTool'
  beginDrag:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Begin drag lifecycle
    messages:
      - $ref: '#/channels/sketchRealtime/messages/DragBegin'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
        - $ref: '#/channels/sketchRealtime/messages/DragBeginAccepted'
        - $ref: '#/channels/sketchRealtime/messages/DragBeginRejected'
        - $ref: '#/channels/sketchRealtime/messages/Error'
  sendDragPreview:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Send transient drag preview
    messages:
      - $ref: '#/channels/sketchRealtime/messages/DragPreview'
  commitDrag:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Commit drag as persistent operation
    messages:
      - $ref: '#/channels/sketchRealtime/messages/DragCommit'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
        - $ref: '#/channels/sketchRealtime/messages/OpCommitted'
        - $ref: '#/channels/sketchRealtime/messages/OpRejected'
        - $ref: '#/channels/sketchRealtime/messages/Error'
  submitOperation:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Submit persistent sketch operation
    messages:
      - $ref: '#/channels/sketchRealtime/messages/OpSubmit'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
        - $ref: '#/channels/sketchRealtime/messages/OpCommitted'
        - $ref: '#/channels/sketchRealtime/messages/OpRejected'
        - $ref: '#/channels/sketchRealtime/messages/Error'
  acquireLock:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Acquire soft edit lock
    messages:
      - $ref: '#/channels/sketchRealtime/messages/LockAcquire'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
        - $ref: '#/channels/sketchRealtime/messages/LockAcquired'
        - $ref: '#/channels/sketchRealtime/messages/LockRejected'
        - $ref: '#/channels/sketchRealtime/messages/Error'
  refreshLock:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Refresh soft edit lock
    messages:
      - $ref: '#/channels/sketchRealtime/messages/LockRefresh'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
        - $ref: '#/channels/sketchRealtime/messages/LockRefreshed'
        - $ref: '#/channels/sketchRealtime/messages/Error'
  releaseLock:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Release soft edit lock
    messages:
      - $ref: '#/channels/sketchRealtime/messages/LockRelease'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
        - $ref: '#/channels/sketchRealtime/messages/LockReleased'
        - $ref: '#/channels/sketchRealtime/messages/Error'

components:
  messages:
    SessionJoin: { name: session.join, title: Join session, payload: { $ref: '#/components/schemas/SessionJoinMessage' }, examples: [ { name: Join with last seen version, payload: { type: session.join, requestId: req_join_1, sketchId: sk_123, clientTime: '2026-05-21T10:00:00Z', payload: { lastSeenVersion: 42, clientId: browser_tab_01, supportedProtocolVersion: 1 } } } ] }
    SessionJoined: { name: session.joined, title: Session joined, payload: { $ref: '#/components/schemas/SessionJoinedMessage' }, examples: [ { name: Joined, payload: { type: session.joined, requestId: req_join_1, eventId: evt_001, sketchId: sk_123, serverTime: '2026-05-21T10:00:01Z', payload: { protocolVersion: 1, currentVersion: 42, missingOpsAvailable: false, user: { userId: usr_1, displayName: David, role: editor, clientId: browser_tab_01 }, activeUsers: [ { userId: usr_2, displayName: Alex, role: editor, clientId: browser_tab_02 } ] } } } ] }
    SessionUserJoined: { name: session.user_joined, title: User joined, payload: { $ref: '#/components/schemas/UserEventMessage' } }
    SessionUserLeft: { name: session.user_left, title: User left, payload: { $ref: '#/components/schemas/UserLeftMessage' } }
    SessionPing: { name: session.ping, title: Ping, payload: { $ref: '#/components/schemas/SessionPingMessage' } }
    SessionPong: { name: session.pong, title: Pong, payload: { $ref: '#/components/schemas/SessionPongMessage' } }
    SessionAccessRevoked: { name: session.access_revoked, title: Access revoked, payload: { $ref: '#/components/schemas/AccessRevokedMessage' } }
    PresenceCursor: { name: presence.cursor, title: Cursor presence, payload: { $ref: '#/components/schemas/PresenceCursorMessage' } }
    PresenceSelection: { name: presence.selection, title: Selection presence, payload: { $ref: '#/components/schemas/PresenceSelectionMessage' } }
    PresenceHover: { name: presence.hover, title: Hover presence, payload: { $ref: '#/components/schemas/PresenceHoverMessage' } }
    PresenceTool: { name: presence.tool, title: Tool presence, payload: { $ref: '#/components/schemas/PresenceToolMessage' } }
    DragBegin: { name: drag.begin, title: Begin drag, payload: { $ref: '#/components/schemas/DragBeginMessage' } }
    DragBeginAccepted: { name: drag.begin.accepted, title: Drag begin accepted, payload: { $ref: '#/components/schemas/DragBeginAcceptedMessage' } }
    DragBeginRejected: { name: drag.begin.rejected, title: Drag begin rejected, payload: { $ref: '#/components/schemas/DragBeginRejectedMessage' } }
    DragPreview: { name: drag.preview, title: Drag preview, payload: { $ref: '#/components/schemas/DragPreviewMessage' } }
    DragCommit: { name: drag.commit, title: Commit drag, payload: { $ref: '#/components/schemas/DragCommitMessage' } }
    DragCancel: { name: drag.cancel, title: Cancel drag, payload: { $ref: '#/components/schemas/DragCancelMessage' } }
    DragCancelled: { name: drag.cancelled, title: Drag cancelled, payload: { $ref: '#/components/schemas/DragCancelledMessage' } }
    OpSubmit: { name: op.submit, title: Submit persistent operation, payload: { $ref: '#/components/schemas/OpSubmitMessage' } }
    OpCommitted: { name: op.committed, title: Operation committed, payload: { $ref: '#/components/schemas/OpCommittedMessage' } }
    OpRejected: { name: op.rejected, title: Operation rejected, payload: { $ref: '#/components/schemas/OpRejectedMessage' } }
    OpsBatch: { name: ops.batch, title: Operations batch, payload: { $ref: '#/components/schemas/OpsBatchMessage' } }
    LockAcquire: { name: lock.acquire, title: Acquire lock, payload: { $ref: '#/components/schemas/LockAcquireMessage' } }
    LockAcquired: { name: lock.acquired, title: Lock acquired, payload: { $ref: '#/components/schemas/LockAcquiredMessage' } }
    LockRejected: { name: lock.rejected, title: Lock rejected, payload: { $ref: '#/components/schemas/LockRejectedMessage' } }
    LockRefresh: { name: lock.refresh, title: Refresh lock, payload: { $ref: '#/components/schemas/LockRefreshMessage' } }
    LockRefreshed: { name: lock.refreshed, title: Lock refreshed, payload: { $ref: '#/components/schemas/LockRefreshedMessage' } }
    LockRelease: { name: lock.release, title: Release lock, payload: { $ref: '#/components/schemas/LockReleaseMessage' } }
    LockReleased: { name: lock.released, title: Lock released, payload: { $ref: '#/components/schemas/LockReleasedMessage' } }
    StateResyncRequired: { name: state.resync_required, title: State resync required, payload: { $ref: '#/components/schemas/StateResyncRequiredMessage' } }
    StateSnapshot: { name: state.snapshot, title: State snapshot, payload: { $ref: '#/components/schemas/StateSnapshotMessage' } }
    StatePatch: { name: state.patch, title: State patch, payload: { $ref: '#/components/schemas/StatePatchMessage' } }
    PermissionUpdated: { name: permission.updated, title: Permission updated, payload: { $ref: '#/components/schemas/PermissionUpdatedMessage' } }
    PermissionRevoked: { name: permission.revoked, title: Permission revoked, payload: { $ref: '#/components/schemas/PermissionRevokedMessage' } }
    ConflictCreated: { name: conflict.created, title: Conflict created, payload: { $ref: '#/components/schemas/ConflictCreatedMessage' } }
    ConflictResolved: { name: conflict.resolved, title: Conflict resolved, payload: { $ref: '#/components/schemas/ConflictResolvedMessage' } }
    Error: { name: error, title: Error, payload: { $ref: '#/components/schemas/ErrorMessage' } }

  schemas:
    RealtimeEnvelope:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        clientTime: { type: string, format: date-time }
        serverTime: { type: string, format: date-time }
        payload: { type: object, additionalProperties: true }

    SessionJoinMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [session.join] }
        requestId: { type: string }
        sketchId: { type: string }
        clientTime: { type: string, format: date-time }
        payload: { $ref: '#/components/schemas/SessionJoinPayload' }
    SessionJoinPayload:
      type: object
      required: [lastSeenVersion, clientId, supportedProtocolVersion]
      properties:
        lastSeenVersion: { type: integer, format: int64, minimum: 0 }
        clientId: { type: string }
        supportedProtocolVersion: { type: integer, minimum: 1 }
    SessionJoinedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [session.joined] }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload: { $ref: '#/components/schemas/SessionJoinedPayload' }
    SessionJoinedPayload:
      type: object
      required: [protocolVersion, currentVersion, user, activeUsers, missingOpsAvailable]
      properties:
        protocolVersion: { type: integer }
        currentVersion: { type: integer, format: int64 }
        user: { $ref: '#/components/schemas/RealtimeUser' }
        activeUsers:
          type: array
          items: { $ref: '#/components/schemas/RealtimeUser' }
        missingOpsAvailable: { type: boolean }
    RealtimeUser:
      type: object
      required: [userId, displayName, role, clientId]
      properties:
        userId: { type: string }
        displayName: { type: string }
        role: { $ref: '#/components/schemas/SketchRole' }
        clientId: { type: string }
    SketchRole: { type: string, enum: [reader, editor, admin] }

    UserEventMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [session.user_joined] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload: { $ref: '#/components/schemas/RealtimeUser' }
    UserLeftMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [session.user_left] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [userId, clientId, reason]
          properties:
            userId: { type: string }
            clientId: { type: string }
            reason: { type: string, enum: [disconnect, access_revoked, server_shutdown, duplicate_connection, protocol_error] }
    SessionPingMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [session.ping] }
        requestId: { type: string }
        sketchId: { type: string }
        clientTime: { type: string, format: date-time }
        payload:
          type: object
          required: [clientVersion]
          properties:
            clientVersion: { type: integer, format: int64 }
    SessionPongMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [session.pong] }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [currentVersion]
          properties:
            currentVersion: { type: integer, format: int64 }
    AccessRevokedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [session.access_revoked] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [message]
          properties:
            message: { type: string }

    PresenceCursorMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [presence.cursor] }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        clientTime: { type: string, format: date-time }
        serverTime: { type: string, format: date-time }
        payload: { $ref: '#/components/schemas/PresenceCursorPayload' }
    PresenceCursorPayload:
      type: object
      required: [x, y]
      properties:
        userId: { type: string }
        clientId: { type: string }
        x: { type: number, format: double }
        y: { type: number, format: double }
        viewport: { $ref: '#/components/schemas/Viewport' }
    Viewport:
      type: object
      required: [scale, offsetX, offsetY]
      properties:
        scale: { type: number, format: double, exclusiveMinimum: 0 }
        offsetX: { type: number, format: double }
        offsetY: { type: number, format: double }
    PresenceSelectionMessage: { $ref: '#/components/schemas/GenericPresenceMessage' }
    PresenceHoverMessage: { $ref: '#/components/schemas/GenericPresenceMessage' }
    PresenceToolMessage: { $ref: '#/components/schemas/GenericPresenceMessage' }
    GenericPresenceMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [presence.selection, presence.hover, presence.tool] }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        clientTime: { type: string, format: date-time }
        serverTime: { type: string, format: date-time }
        payload: { type: object, additionalProperties: true }

    DragBeginMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [drag.begin] }
        requestId: { type: string }
        sketchId: { type: string }
        payload:
          type: object
          required: [entityId, kind, baseVersion]
          properties:
            entityId: { type: string }
            kind: { type: string, enum: [point, line, circle, arc, entity] }
            baseVersion: { type: integer, format: int64 }
    DragBeginAcceptedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [drag.begin.accepted] }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [lockId, lockedEntityIds]
          properties:
            lockId: { type: string }
            componentId: { type: string }
            lockedEntityIds:
              type: array
              items: { type: string }
    DragBeginRejectedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [drag.begin.rejected] }
        requestId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [reason]
          properties:
            reason: { type: string, enum: [lock_conflict, permission_denied, invalid_reference, stale_base_version] }
            lockedByUserId: { type: string }
            lockId: { type: string }
    DragPreviewMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [drag.preview] }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        clientTime: { type: string, format: date-time }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [entityId, target]
          properties:
            userId: { type: string }
            clientId: { type: string }
            lockId: { type: string }
            entityId: { type: string }
            target: { $ref: '#/components/schemas/Vec2' }
    DragCommitMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [drag.commit] }
        requestId: { type: string }
        sketchId: { type: string }
        payload:
          type: object
          required: [baseVersion, clientOpId, op]
          properties:
            lockId: { type: string }
            baseVersion: { type: integer, format: int64 }
            clientOpId: { type: string }
            op: { $ref: '#/components/schemas/SketchOperation' }
    DragCancelMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [drag.cancel] }
        requestId: { type: string }
        sketchId: { type: string }
        payload:
          type: object
          required: [entityId]
          properties:
            lockId: { type: string }
            entityId: { type: string }
    DragCancelledMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [drag.cancelled] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [userId, entityId]
          properties:
            userId: { type: string }
            entityId: { type: string }
            lockId: { type: string }

    OpSubmitMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [op.submit] }
        requestId: { type: string }
        sketchId: { type: string }
        payload: { $ref: '#/components/schemas/OpSubmitPayload' }
    OpSubmitPayload:
      type: object
      required: [baseVersion, clientOpId, op]
      properties:
        baseVersion: { type: integer, format: int64 }
        clientOpId: { type: string }
        op: { $ref: '#/components/schemas/SketchOperation' }
    OpCommittedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [op.committed] }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload: { $ref: '#/components/schemas/OpCommittedPayload' }
    OpCommittedPayload:
      type: object
      required: [opId, version, actorUserId, op, patch, solveStatus, affectedEntityIds]
      properties:
        opId: { type: string }
        version: { type: integer, format: int64 }
        actorUserId: { type: string }
        clientOpId: { type: string }
        op: { $ref: '#/components/schemas/SketchOperation' }
        patch: { $ref: '#/components/schemas/SketchPatch' }
        solveStatus: { $ref: '#/components/schemas/SolveStatus' }
        affectedEntityIds:
          type: array
          items: { type: string }
    OpRejectedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [op.rejected] }
        requestId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload: { $ref: '#/components/schemas/OpRejectedPayload' }
    OpRejectedPayload:
      type: object
      required: [clientOpId, currentVersion, reason, message]
      properties:
        clientOpId: { type: string }
        currentVersion: { type: integer, format: int64 }
        reason: { type: string, enum: [stale_base_version, permission_denied, lock_conflict, invalid_reference, invalid_operation, solver_inconsistent, solver_over_constrained, solver_numerical_failure, unsupported_operation] }
        message: { type: string }
        diagnostics:
          type: array
          items: { $ref: '#/components/schemas/SolverDiagnostic' }
    OpsBatchMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [ops.batch] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [fromVersion, toVersion, ops]
          properties:
            fromVersion: { type: integer, format: int64 }
            toVersion: { type: integer, format: int64 }
            ops:
              type: array
              items: { $ref: '#/components/schemas/CommittedOperation' }
    CommittedOperation:
      type: object
      required: [opId, version, actorUserId, op]
      properties:
        opId: { type: string }
        version: { type: integer, format: int64 }
        actorUserId: { type: string }
        clientOpId: { type: string }
        createdAt: { type: string, format: date-time }
        op: { $ref: '#/components/schemas/SketchOperation' }

    SketchOperation:
      type: object
      required: [type]
      description: Persistent sketch operation. Concrete shape is selected by the type field. Discriminator is intentionally avoided for better AsyncAPI tooling compatibility.
      properties:
        type:
          type: string
          enum: [create_point, create_line, create_circle, create_arc, create_polyline, create_rectangle, move_point, delete_entity, add_constraint, remove_constraint, add_dimension, set_dimension_value, remove_dimension]
        x: { type: number, format: double }
        y: { type: number, format: double }
        pointId: { type: string }
        entityId: { type: string }
        constraintId: { type: string }
        dimensionId: { type: string }
        value: { type: number, format: double }
        radius: { type: number, format: double, exclusiveMinimum: 0 }
        clockwise: { type: boolean }
        closed: { type: boolean }
        start: { $ref: '#/components/schemas/PointRefOrNew' }
        end: { $ref: '#/components/schemas/PointRefOrNew' }
        center: { $ref: '#/components/schemas/PointRefOrNew' }
        target: { $ref: '#/components/schemas/Vec2' }
        cornerA: { $ref: '#/components/schemas/Vec2' }
        cornerB: { $ref: '#/components/schemas/Vec2' }
        points:
          type: array
          items: { $ref: '#/components/schemas/Vec2' }
        constraint: { $ref: '#/components/schemas/Constraint' }
        dimension: { $ref: '#/components/schemas/Dimension' }
      additionalProperties: true
    PointRefOrNew:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [existing_point, new_point] }
        pointId: { type: string }
        x: { type: number, format: double }
        y: { type: number, format: double }
    Constraint:
      type: object
      required: [type, refs]
      properties:
        id: { type: string }
        type: { type: string, enum: [coincident, horizontal, vertical, parallel, perpendicular, tangent, equal, fixed, midpoint, concentric] }
        refs:
          type: array
          minItems: 1
          items: { type: string }
        branch: { type: string, enum: [external, internal] }
        status: { type: string, enum: [active, invalid, removed] }
    Dimension:
      type: object
      required: [type, refs, value, driving]
      properties:
        id: { type: string }
        type: { type: string, enum: [distance, radius, diameter, angle] }
        refs:
          type: array
          minItems: 1
          items: { type: string }
        value: { type: number, format: double }
        driving: { type: boolean }
        orientation: { type: string, enum: [cw, ccw] }
    SketchPatch:
      type: object
      properties:
        entities: { type: object, additionalProperties: true }
        constraints: { type: object, additionalProperties: true }
        dimensions: { type: object, additionalProperties: true }
        deletedEntityIds:
          type: array
          items: { type: string }
        deletedConstraintIds:
          type: array
          items: { type: string }
        deletedDimensionIds:
          type: array
          items: { type: string }
    SolveStatus:
      type: object
      required: [status, degreesOfFreedom]
      properties:
        status: { type: string, enum: [ok, under_constrained, fully_constrained, over_constrained, inconsistent, numerical_failure] }
        degreesOfFreedom: { type: integer }
        diagnostics:
          type: array
          items: { $ref: '#/components/schemas/SolverDiagnostic' }
    SolverDiagnostic:
      type: object
      required: [level, code, message]
      properties:
        level: { type: string, enum: [info, warning, error] }
        code: { type: string }
        message: { type: string }
        entityIds:
          type: array
          items: { type: string }
        constraintIds:
          type: array
          items: { type: string }
        dimensionIds:
          type: array
          items: { type: string }

    LockAcquireMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [lock.acquire] }
        requestId: { type: string }
        sketchId: { type: string }
        payload: { $ref: '#/components/schemas/LockAcquirePayload' }
    LockAcquirePayload:
      type: object
      required: [scope, mode, ttlMs]
      properties:
        scope: { $ref: '#/components/schemas/LockScope' }
        mode: { type: string, enum: [edit] }
        ttlMs: { type: integer, minimum: 1000 }
    LockScope:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [entity, constraint, dimension, constraint_component] }
        entityId: { type: string }
        constraintId: { type: string }
        dimensionId: { type: string }
        componentId: { type: string }
    LockAcquiredMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [lock.acquired] }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [lockId, userId, scope, entityIds, expiresAt]
          properties:
            lockId: { type: string }
            userId: { type: string }
            scope: { $ref: '#/components/schemas/LockScope' }
            entityIds:
              type: array
              items: { type: string }
            expiresAt: { type: string, format: date-time }
    LockRejectedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [lock.rejected] }
        requestId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [reason]
          properties:
            reason: { type: string, enum: [already_locked, permission_denied, invalid_scope] }
            lockedByUserId: { type: string }
            lockId: { type: string }
    LockRefreshMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [lock.refresh] }
        requestId: { type: string }
        sketchId: { type: string }
        payload:
          type: object
          required: [lockId, ttlMs]
          properties:
            lockId: { type: string }
            ttlMs: { type: integer, minimum: 1000 }
    LockRefreshedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [lock.refreshed] }
        requestId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [lockId, expiresAt]
          properties:
            lockId: { type: string }
            expiresAt: { type: string, format: date-time }
    LockReleaseMessage:
      type: object
      required: [type, sketchId, payload]
      properties:
        type: { type: string, enum: [lock.release] }
        requestId: { type: string }
        sketchId: { type: string }
        payload:
          type: object
          required: [lockId]
          properties:
            lockId: { type: string }
    LockReleasedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [lock.released] }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [lockId, reason]
          properties:
            lockId: { type: string }
            reason: { type: string, enum: [released, expired, user_disconnected, operation_committed, server_revoked] }
            userId: { type: string }

    StateResyncRequiredMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [state.resync_required] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [currentVersion, reason, recommendedAction]
          properties:
            currentVersion: { type: integer, format: int64 }
            reason: { type: string, enum: [client_too_far_behind, missed_events, server_restart, protocol_error] }
            recommendedAction: { type: string, enum: [fetch_snapshot, fetch_ops, reconnect] }
    StateSnapshotMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [state.snapshot] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [version, document]
          properties:
            version: { type: integer, format: int64 }
            document: { $ref: '#/components/schemas/SketchDocument' }
    StatePatchMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [state.patch] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [version, patch]
          properties:
            version: { type: integer, format: int64 }
            patch: { $ref: '#/components/schemas/SketchPatch' }
    SketchDocument:
      type: object
      properties:
        entities: { type: object, additionalProperties: true }
        constraints: { type: object, additionalProperties: true }
        dimensions: { type: object, additionalProperties: true }
        groups: { type: object, additionalProperties: true }
        materializedGeometry: { type: object, additionalProperties: true }
        solveStatus: { $ref: '#/components/schemas/SolveStatus' }

    PermissionUpdatedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [permission.updated] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [targetUserId, role, changedByUserId]
          properties:
            targetUserId: { type: string }
            role: { $ref: '#/components/schemas/SketchRole' }
            changedByUserId: { type: string }
    PermissionRevokedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [permission.revoked] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [targetUserId, changedByUserId]
          properties:
            targetUserId: { type: string }
            changedByUserId: { type: string }

    ConflictCreatedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [conflict.created] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [conflictId, conflictType, status, affectedEntityIds, causedByOps, message]
          properties:
            conflictId: { type: string }
            conflictType: { type: string, enum: [over_constrained, inconsistent_constraints, dangling_reference, dimension_conflict, solver_branch_conflict] }
            status: { type: string, enum: [open, resolved, ignored] }
            affectedEntityIds:
              type: array
              items: { type: string }
            causedByOps:
              type: array
              items: { type: string }
            message: { type: string }
            possibleResolutions:
              type: array
              items: { type: object, additionalProperties: true }
    ConflictResolvedMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [conflict.resolved] }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload:
          type: object
          required: [conflictId, resolvedByUserId]
          properties:
            conflictId: { type: string }
            resolvedByUserId: { type: string }
            resolutionOpId: { type: string }

    ErrorMessage:
      type: object
      required: [type, sketchId, serverTime, payload]
      properties:
        type: { type: string, enum: [error] }
        requestId: { type: string }
        eventId: { type: string }
        sketchId: { type: string }
        serverTime: { type: string, format: date-time }
        payload: { $ref: '#/components/schemas/ErrorPayload' }
    ErrorPayload:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [INVALID_MESSAGE, INVALID_PAYLOAD, AUTH_REQUIRED, PERMISSION_DENIED, SKETCH_NOT_FOUND, STALE_VERSION, LOCK_CONFLICT, RATE_LIMITED, INTERNAL_ERROR] }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    Vec2:
      type: object
      required: [x, y]
      properties:
        x: { type: number, format: double }
        y: { type: number, format: double }
