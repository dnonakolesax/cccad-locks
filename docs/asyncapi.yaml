    SyncResumePayload:
      type: object
      description: Reconnect request. Pending operations are durable semantic operations created while offline; they must
        not contain frontend-solved geometry as the source of truth.
      required:
      - clientId
      - lastSeenVersion
      - pendingOps
      properties:
        clientId:
          type: string
        lastSeenVersion:
          type: integer
          format: int64
          description: Highest committed server version known by this client before reconnect.
        lastAckedClientSeq:
          type: integer
          format: int64
          description: Highest client sequence number acknowledged by the server, if known.
        pendingOps:
          type: array
          description: Ordered durable operations created while the client was offline. Backend must process them in ascending
            clientSeq order.
          items:
            $ref: '#/components/schemas/PendingOfflineOperation'
