    IntentDraftPayload:
      type: object
      description: 'Ephemeral description of another user''s current unfinished tool operation.

        This payload is suitable for grey ghost rendering, cursor hints and selected anchor highlighting.

        It is not a persistent operation and it must not be stored in the PostgreSQL operation log.

        '
      required:
      - draftId
      - actorUserId
      - clientId
      - baseVersion
      - tool
      - phase
      properties:
        draftId:
          type: string
          description: Stable id for one unfinished operation. Reused by subsequent intent.draft.update messages.
        actorUserId:
          type: string
        actorUserName:
          type: string
        clientId:
          type: string
        baseVersion:
          type: integer
          format: int64
          description: Sketch version visible to the actor when the draft was started.
        tool:
          type: string
          enum:
          - select
          - point
          - line
          - circle
          - arc
          - polyline
          - rectangle
          - constraint
          - dimension
          - move
          - trim
        operationType:
          type: string
          description: Optional target persistent operation type if the draft is later committed.
          enum:
          - create_point
          - create_line
          - create_circle
          - create_arc
          - create_polyline
          - create_rectangle
          - ApplyFillet
          - UpdateFillet
          - ApplyChamfer
          - UpdateChamfer
          - set_entity_construction
          - split_entity
          - break_entity_at_point
          - trim_entity
          - extend_entity
          - mirror_entities
          - linear_pattern
          - circular_pattern
          - move_point
          - add_constraint
          - add_dimension
          - set_dimension_value
        phase:
          type: string
          enum:
