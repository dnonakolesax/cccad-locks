          type: string
          description: Stable idempotency key generated by the client.
        clientSeq:
          type: integer
          format: int64
          description: Monotonic sequence number for this client/session.
        baseVersion:
          type: integer
          format: int64
          description: Sketch version on which the operation was originally created.
        createdAt:
          type: string
          format: date-time
        op:
          $ref: '#/components/schemas/SketchOperation'
