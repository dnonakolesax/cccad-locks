          enum:
          - stale_base_version
          - permission_denied
          - lock_conflict
          - invalid_reference
          - invalid_operation
          - solver_inconsistent
          - solver_over_constrained
          - solver_numerical_failure
          - unsupported_operation
        message:
          type: string
        diagnostics:
          type: array
          items:
            $ref: '#/components/schemas/SolverDiagnostic'
