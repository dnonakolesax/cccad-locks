          - select_first_point
          - select_second_point
          - select_center
          - select_radius
          - select_start
          - select_end
          - select_entity
          - select_constraint_target
          - dragging
          - preview
          - ready_to_commit
        sequence:
          type: integer
          minimum: 0
          description: Monotonic per-draft sequence number. Clients may ignore older updates for the same draftId.
        selectedEntityIds:
          type: array
          items:
            type: string
        selectedPointIds:
          type: array
          items:
            type: string
        hoverEntityId:
          type: string
        hoverPointId:
          type: string
