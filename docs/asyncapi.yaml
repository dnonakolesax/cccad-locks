    SketchPatch:
      type: object
      description: 'Sparse patch applied to the client''s local sketch state.


        In op.committed this patch is produced by backend-side C++ solver recalculation and is authoritative.

        It is not required to contain the full sketch. For normal interactive operations it should contain only

        changed/affected entities, constraints, dimensions and materialized geometry. If the client cannot apply

        the patch cleanly, it should request state.resync_required / state.snapshot flow.

        '
      properties:
        entities:
          type: object
          description: Upsert map for changed or affected logical entities, keyed by entity id.
          additionalProperties: true
        constraints:
          type: object
          description: Upsert map for changed or affected constraints, keyed by constraint id.
          additionalProperties: true
        dimensions:
          type: object
          description: Upsert map for changed or affected dimensions, keyed by dimension id.
          additionalProperties: true
        materializedGeometry:
          type: object
          description: Optional solver-produced render/geometry cache for affected entities, keyed by entity id.
          additionalProperties: true
        profiles:
          type: array
          description: Solver-detected closed sketch profiles available to frontend tools such as extrusion selection.
          items:
            $ref: '#/components/schemas/Profile'
        deletedEntityIds:
          type: array
          items:
            type: string
        deletedConstraintIds:
          type: array
          items:
            type: string
        deletedDimensionIds:
          type: array
          items:
            type: string
