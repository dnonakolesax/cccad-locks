asyncapi: 3.1.0
info:
  title: cccAD Realtime Collaboration API
  version: 1.0.0
  description: "WebSocket protocol for cccAD collaborative 2D sketch editing.\n\nREST OpenAPI is used for initial document\
    \ loading and regular HTTP commands.\nThis AsyncAPI document describes realtime WebSocket messages.\n\nRules:\n  - PostgreSQL\
    \ sketch operation log is the persistent source of truth.\n  - op.committed is the only realtime event after which a client\
    \ mutates real document state.\n  - Frontend-side solving is optimistic preview only; op.committed.patch is the authoritative\
    \ solver result.\n  - Backend must call the C++ sketch-solver before emitting op.committed for geometry-changing operations.\n\
    \  - op.committed.patch may contain only changed/affected entities, constraints, dimensions and materialized geometry.\n\
    \  - Clients must reconcile local optimistic state by applying op.committed.patch, not by re-solving the original op.\n\
    \  - presence.*, intent.draft.*, drag.preview, session ping/pong and locks are transient.\n  - intent.draft.* messages\
    \ expose another user's unfinished tool state, such as selecting the first point of a line and previewing the second point.\n\
    \  - intent.draft.* messages never mutate canonical sketch state; only op.committed may do that.\n  - Redis may be used\
    \ for presence, locks and pub/sub fanout.\n  - S3 is used for previews, exports, imports and large snapshots, not live\
    \ sketch state.\n\nOffline/reconnect rules:\n  - Offline user edits are stored on the client as durable semantic operations,\
    \ not as solved geometry patches.\n  - The client stores pending operations locally, typically in IndexedDB, using stable\
    \ clientOpId/clientSeq values.\n  - After reconnect the client sends sync.resume with lastSeenVersion and ordered pendingOps.\n\
    \  - Backend replays pending operations over the current canonical sketch state, calls the C++ sketch-solver for every\
    \ accepted operation, and returns authoritative patches or rejected diagnostics.\n  - intent.draft.* and presence.* are\
    \ ephemeral and must not be replayed after reconnect.\n  - Idempotency is required: if a clientOpId was already committed\
    \ or rejected, backend must return the previously stored result instead of applying it again.\n"
defaultContentType: application/json
servers:
  local:
    host: localhost:8080
    protocol: ws
    pathname: /api/v1/sketches/{sketchId}/ws
    description: Local development server.
    variables:
      sketchId:
        default: sk_example
        description: Sketch identifier.
  production:
    host: api.cccad.example.com
    protocol: wss
    pathname: /api/v1/sketches/{sketchId}/ws
    description: Production server.
    variables:
      sketchId:
        default: sk_example
        description: Sketch identifier.
channels:
  sketchRealtime:
    address: /api/v1/sketches/{sketchId}/ws
    description: "Bidirectional WebSocket channel for one sketch document.\n\nClient should first load initial state through\
      \ REST:\n  GET /api/v1/sketches/{sketchId}\n\nThen it should connect to this WebSocket and send session.join.\n"
    parameters:
      sketchId:
        description: Sketch identifier from the URL path.
    messages:
      SessionJoin:
        $ref: '#/components/messages/SessionJoin'
      SessionJoined:
        $ref: '#/components/messages/SessionJoined'
      SessionUserJoined:
        $ref: '#/components/messages/SessionUserJoined'
      SessionUserLeft:
        $ref: '#/components/messages/SessionUserLeft'
      SessionPing:
        $ref: '#/components/messages/SessionPing'
      SessionPong:
        $ref: '#/components/messages/SessionPong'
      SessionAccessRevoked:
        $ref: '#/components/messages/SessionAccessRevoked'
      PresenceCursor:
        $ref: '#/components/messages/PresenceCursor'
      PresenceSelection:
        $ref: '#/components/messages/PresenceSelection'
      PresenceHover:
        $ref: '#/components/messages/PresenceHover'
      PresenceTool:
        $ref: '#/components/messages/PresenceTool'
      IntentDraftBegin:
        $ref: '#/components/messages/IntentDraftBegin'
      IntentDraftUpdate:
        $ref: '#/components/messages/IntentDraftUpdate'
      IntentDraftCancel:
        $ref: '#/components/messages/IntentDraftCancel'
      IntentDraftEnded:
        $ref: '#/components/messages/IntentDraftEnded'
      DragBegin:
        $ref: '#/components/messages/DragBegin'
      DragBeginAccepted:
        $ref: '#/components/messages/DragBeginAccepted'
      DragBeginRejected:
        $ref: '#/components/messages/DragBeginRejected'
      DragPreview:
        $ref: '#/components/messages/DragPreview'
      DragCommit:
        $ref: '#/components/messages/DragCommit'
      DragCancel:
        $ref: '#/components/messages/DragCancel'
      DragCancelled:
        $ref: '#/components/messages/DragCancelled'
      OpSubmit:
        $ref: '#/components/messages/OpSubmit'
      OpCommitted:
        $ref: '#/components/messages/OpCommitted'
      OpRejected:
        $ref: '#/components/messages/OpRejected'
      OpsBatch:
        $ref: '#/components/messages/OpsBatch'
      LockAcquire:
        $ref: '#/components/messages/LockAcquire'
      LockAcquired:
        $ref: '#/components/messages/LockAcquired'
      LockRejected:
        $ref: '#/components/messages/LockRejected'
      LockRefresh:
        $ref: '#/components/messages/LockRefresh'
      LockRefreshed:
        $ref: '#/components/messages/LockRefreshed'
      LockRelease:
        $ref: '#/components/messages/LockRelease'
      LockReleased:
        $ref: '#/components/messages/LockReleased'
      StateResyncRequired:
        $ref: '#/components/messages/StateResyncRequired'
      StateSnapshot:
        $ref: '#/components/messages/StateSnapshot'
      StatePatch:
        $ref: '#/components/messages/StatePatch'
      PermissionUpdated:
        $ref: '#/components/messages/PermissionUpdated'
      PermissionRevoked:
        $ref: '#/components/messages/PermissionRevoked'
      ConflictCreated:
        $ref: '#/components/messages/ConflictCreated'
      ConflictResolved:
        $ref: '#/components/messages/ConflictResolved'
      Error:
        $ref: '#/components/messages/Error'
      SyncResume:
        $ref: '#/components/messages/SyncResume'
      SyncResumeResult:
        $ref: '#/components/messages/SyncResumeResult'
operations:
  joinSession:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Join realtime sketch session
    messages:
    - $ref: '#/channels/sketchRealtime/messages/SessionJoin'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
      - $ref: '#/channels/sketchRealtime/messages/SessionJoined'
      - $ref: '#/channels/sketchRealtime/messages/Error'
  heartbeat:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Heartbeat ping
    messages:
    - $ref: '#/channels/sketchRealtime/messages/SessionPing'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
      - $ref: '#/channels/sketchRealtime/messages/SessionPong'
      - $ref: '#/channels/sketchRealtime/messages/Error'
  sendPresence:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Send transient presence events
    messages:
    - $ref: '#/channels/sketchRealtime/messages/PresenceCursor'
    - $ref: '#/channels/sketchRealtime/messages/PresenceSelection'
    - $ref: '#/channels/sketchRealtime/messages/PresenceHover'
    - $ref: '#/channels/sketchRealtime/messages/PresenceTool'
  sendIntentDraft:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Send transient construction/edit intent draft events
    summary: Used to show another user's unfinished tool state without changing canonical sketch state.
    messages:
    - $ref: '#/channels/sketchRealtime/messages/IntentDraftBegin'
    - $ref: '#/channels/sketchRealtime/messages/IntentDraftUpdate'
    - $ref: '#/channels/sketchRealtime/messages/IntentDraftCancel'
    - $ref: '#/channels/sketchRealtime/messages/IntentDraftEnded'
  beginDrag:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Begin drag lifecycle
    messages:
    - $ref: '#/channels/sketchRealtime/messages/DragBegin'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
      - $ref: '#/channels/sketchRealtime/messages/DragBeginAccepted'
      - $ref: '#/channels/sketchRealtime/messages/DragBeginRejected'
      - $ref: '#/channels/sketchRealtime/messages/Error'
  sendDragPreview:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Send transient drag preview
    messages:
    - $ref: '#/channels/sketchRealtime/messages/DragPreview'
  commitDrag:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Commit drag as persistent operation
    messages:
    - $ref: '#/channels/sketchRealtime/messages/DragCommit'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
      - $ref: '#/channels/sketchRealtime/messages/OpCommitted'
      - $ref: '#/channels/sketchRealtime/messages/OpRejected'
      - $ref: '#/channels/sketchRealtime/messages/Error'
  submitOperation:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Submit persistent sketch operation
    messages:
    - $ref: '#/channels/sketchRealtime/messages/OpSubmit'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
      - $ref: '#/channels/sketchRealtime/messages/OpCommitted'
      - $ref: '#/channels/sketchRealtime/messages/OpRejected'
      - $ref: '#/channels/sketchRealtime/messages/Error'
  acquireLock:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Acquire soft edit lock
    messages:
    - $ref: '#/channels/sketchRealtime/messages/LockAcquire'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
      - $ref: '#/channels/sketchRealtime/messages/LockAcquired'
      - $ref: '#/channels/sketchRealtime/messages/LockRejected'
      - $ref: '#/channels/sketchRealtime/messages/Error'
  refreshLock:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Refresh soft edit lock
    messages:
    - $ref: '#/channels/sketchRealtime/messages/LockRefresh'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
      - $ref: '#/channels/sketchRealtime/messages/LockRefreshed'
      - $ref: '#/channels/sketchRealtime/messages/Error'
  releaseLock:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Release soft edit lock
    messages:
    - $ref: '#/channels/sketchRealtime/messages/LockRelease'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
      - $ref: '#/channels/sketchRealtime/messages/LockReleased'
      - $ref: '#/channels/sketchRealtime/messages/Error'
  resumeSync:
    action: send
    channel:
      $ref: '#/channels/sketchRealtime'
    title: Resume realtime session after offline period
    summary: Client submits its last seen version and ordered durable offline operations. Backend returns missed authoritative
      patches and per-operation committed/rejected results.
    messages:
    - $ref: '#/channels/sketchRealtime/messages/SyncResume'
    reply:
      channel:
        $ref: '#/channels/sketchRealtime'
      messages:
      - $ref: '#/channels/sketchRealtime/messages/SyncResumeResult'
      - $ref: '#/channels/sketchRealtime/messages/StateSnapshot'
      - $ref: '#/channels/sketchRealtime/messages/StateResyncRequired'
      - $ref: '#/channels/sketchRealtime/messages/Error'
components:
  messages:
    SessionJoin:
      name: session.join
      title: Join session
      payload:
        $ref: '#/components/schemas/SessionJoinMessage'
      examples:
      - name: Join with last seen version
        payload:
          type: session.join
          requestId: req_join_1
          sketchId: sk_123
          clientTime: '2026-05-21T10:00:00Z'
          payload:
            lastSeenVersion: 42
            clientId: browser_tab_01
            supportedProtocolVersion: 1
    SessionJoined:
      name: session.joined
      title: Session joined
      payload:
        $ref: '#/components/schemas/SessionJoinedMessage'
      examples:
      - name: Joined
        payload:
          type: session.joined
          requestId: req_join_1
          eventId: evt_001
          sketchId: sk_123
          serverTime: '2026-05-21T10:00:01Z'
          payload:
            protocolVersion: 1
            currentVersion: 42
            missingOpsAvailable: false
            user:
              userId: usr_1
              userName: david
              displayName: David
              role: editor
              clientId: browser_tab_01
            activeUsers:
            - userId: usr_2
              userName: alex
              displayName: Alex
              role: editor
              clientId: browser_tab_02
    SessionUserJoined:
      name: session.user_joined
      title: User joined
      payload:
        $ref: '#/components/schemas/UserEventMessage'
    SessionUserLeft:
      name: session.user_left
      title: User left
      payload:
        $ref: '#/components/schemas/UserLeftMessage'
    SessionPing:
      name: session.ping
      title: Ping
      payload:
        $ref: '#/components/schemas/SessionPingMessage'
    SessionPong:
      name: session.pong
      title: Pong
      payload:
        $ref: '#/components/schemas/SessionPongMessage'
    SessionAccessRevoked:
      name: session.access_revoked
      title: Access revoked
      payload:
        $ref: '#/components/schemas/AccessRevokedMessage'
    PresenceCursor:
      name: presence.cursor
      title: Cursor presence
      summary: Transient mouse cursor position broadcast so collaborators can render another user's cursor and display name in
        the sketch canvas.
      payload:
        $ref: '#/components/schemas/PresenceCursorMessage'
    PresenceSelection:
      name: presence.selection
      title: Selection presence
      payload:
        $ref: '#/components/schemas/PresenceSelectionMessage'
    PresenceHover:
      name: presence.hover
      title: Hover presence
      payload:
        $ref: '#/components/schemas/PresenceHoverMessage'
    PresenceTool:
      name: presence.tool
      title: Tool presence
      payload:
        $ref: '#/components/schemas/PresenceToolMessage'
    IntentDraftBegin:
      name: intent.draft.begin
      title: Begin transient intent draft
      summary: Broadcasts that a user started an unfinished construction/edit intent. Does not mutate canonical sketch state.
      payload:
        $ref: '#/components/schemas/IntentDraftBeginMessage'
      examples:
      - name: User selected first point for a line
        payload:
          type: intent.draft.begin
          requestId: req_draft_1
          eventId: evt_draft_1
          sketchId: sk_123
          serverTime: '2026-05-26T12:05:00Z'
          payload:
            draftId: draft_line_usr1_001
            actorUserId: usr_1
            actorUserName: david
            clientId: browser_tab_01
            baseVersion: 43
            tool: line
            operationType: create_line
            phase: select_second_point
            selectedPointIds:
            - p1
            anchors:
            - kind: point
              pointId: p1
              position:
                x: 10.0
                y: 20.0
            styleHint: ghost
            ttlMs: 3000
    IntentDraftUpdate:
      name: intent.draft.update
      title: Update transient intent draft
      summary: Broadcasts intermediate cursor/preview geometry for an unfinished operation. Does not mutate canonical sketch
        state.
      payload:
        $ref: '#/components/schemas/IntentDraftUpdateMessage'
      examples:
      - name: User previews second point for a line
        payload:
          type: intent.draft.update
          requestId: req_draft_2
          eventId: evt_draft_2
          sketchId: sk_123
          serverTime: '2026-05-26T12:05:01Z'
          payload:
            draftId: draft_line_usr1_001
            actorUserId: usr_1
            actorUserName: david
            clientId: browser_tab_01
            baseVersion: 43
            tool: line
            operationType: create_line
            phase: preview
            selectedPointIds:
            - p1
            cursorWorld:
              x: 100.0
              y: 45.0
            preview:
              entities:
                ghost_line_1:
                  type: line
                  start:
                    x: 10.0
                    y: 20.0
                  end:
                    x: 100.0
                    y: 45.0
            styleHint: ghost
            sequence: 2
            ttlMs: 3000
    IntentDraftCancel:
      name: intent.draft.cancel
      title: Cancel transient intent draft
      payload:
        $ref: '#/components/schemas/IntentDraftCancelMessage'
    IntentDraftEnded:
      name: intent.draft.ended
      title: Transient intent draft ended
      summary: Server broadcast telling clients to remove a ghost draft because it was committed, cancelled, timed out or
        disconnected.
      payload:
        $ref: '#/components/schemas/IntentDraftEndedMessage'
    DragBegin:
      name: drag.begin
      title: Begin drag
      payload:
        $ref: '#/components/schemas/DragBeginMessage'
    DragBeginAccepted:
      name: drag.begin.accepted
      title: Drag begin accepted
      payload:
        $ref: '#/components/schemas/DragBeginAcceptedMessage'
    DragBeginRejected:
      name: drag.begin.rejected
      title: Drag begin rejected
      payload:
        $ref: '#/components/schemas/DragBeginRejectedMessage'
    DragPreview:
      name: drag.preview
      title: Drag preview
      payload:
        $ref: '#/components/schemas/DragPreviewMessage'
    DragCommit:
      name: drag.commit
      title: Commit drag
      payload:
        $ref: '#/components/schemas/DragCommitMessage'
    DragCancel:
      name: drag.cancel
      title: Cancel drag
      payload:
        $ref: '#/components/schemas/DragCancelMessage'
    DragCancelled:
      name: drag.cancelled
      title: Drag cancelled
      payload:
        $ref: '#/components/schemas/DragCancelledMessage'
    OpSubmit:
      name: op.submit
      title: Submit persistent operation
      payload:
        $ref: '#/components/schemas/OpSubmitMessage'
    OpCommitted:
      name: op.committed
      title: Operation committed
      summary: Authoritative committed operation result produced after backend-side C++ solver recalculation.
      payload:
        $ref: '#/components/schemas/OpCommittedMessage'
      examples:
      - name: Move point committed with authoritative solver patch
        payload:
          type: op.committed
          requestId: req_move_1
          eventId: evt_1001
          sketchId: sk_123
          serverTime: '2026-05-26T12:00:00Z'
          payload:
            opId: op_1001
            version: 43
            actorUserId: usr_1
            actorUserName: david
            clientOpId: client_op_77
            op:
              type: move_point
              pointId: p2
              target:
                x: 130.0
                y: 40.0
            patch:
              entities:
                p2:
                  type: point
                  x: 130.0
                  y: 0.0
                l1:
                  type: line
                  startPointId: p1
                  endPointId: p2
              materializedGeometry:
                l1:
                  type: line_segment
                  start:
                    x: 0.0
                    y: 0.0
                  end:
                    x: 130.0
                    y: 0.0
              profiles:
              - id: profile_1
                outerLoop:
                  entityIds:
                  - l1
                  - l2
                  - l3
                  - l4
                innerLoops: []
                area: 5200.0
                validForExtrude: true
            solveStatus:
              status: under_constrained
              degreesOfFreedom: 3
              diagnostics: []
            affectedEntityIds:
            - p2
            - l1
            affectedConstraintIds:
            - c_horizontal_1
            affectedDimensionIds: []
            affectedComponentIds:
            - cmp_1
            authoritative: true
    OpRejected:
      name: op.rejected
      title: Operation rejected
      payload:
        $ref: '#/components/schemas/OpRejectedMessage'
    OpsBatch:
      name: ops.batch
      title: Operations batch
      payload:
        $ref: '#/components/schemas/OpsBatchMessage'
    LockAcquire:
      name: lock.acquire
      title: Acquire lock
      payload:
        $ref: '#/components/schemas/LockAcquireMessage'
    LockAcquired:
      name: lock.acquired
      title: Lock acquired
      payload:
        $ref: '#/components/schemas/LockAcquiredMessage'
    LockRejected:
      name: lock.rejected
      title: Lock rejected
      payload:
        $ref: '#/components/schemas/LockRejectedMessage'
    LockRefresh:
      name: lock.refresh
      title: Refresh lock
      payload:
        $ref: '#/components/schemas/LockRefreshMessage'
    LockRefreshed:
      name: lock.refreshed
      title: Lock refreshed
      payload:
        $ref: '#/components/schemas/LockRefreshedMessage'
    LockRelease:
      name: lock.release
      title: Release lock
      payload:
        $ref: '#/components/schemas/LockReleaseMessage'
    LockReleased:
      name: lock.released
      title: Lock released
      payload:
        $ref: '#/components/schemas/LockReleasedMessage'
    StateResyncRequired:
      name: state.resync_required
      title: State resync required
      payload:
        $ref: '#/components/schemas/StateResyncRequiredMessage'
    StateSnapshot:
      name: state.snapshot
      title: State snapshot
      payload:
        $ref: '#/components/schemas/StateSnapshotMessage'
    StatePatch:
      name: state.patch
      title: State patch
      payload:
        $ref: '#/components/schemas/StatePatchMessage'
    PermissionUpdated:
      name: permission.updated
      title: Permission updated
      payload:
        $ref: '#/components/schemas/PermissionUpdatedMessage'
    PermissionRevoked:
      name: permission.revoked
      title: Permission revoked
      payload:
        $ref: '#/components/schemas/PermissionRevokedMessage'
    ConflictCreated:
      name: conflict.created
      title: Conflict created
      payload:
        $ref: '#/components/schemas/ConflictCreatedMessage'
    ConflictResolved:
      name: conflict.resolved
      title: Conflict resolved
      payload:
        $ref: '#/components/schemas/ConflictResolvedMessage'
    Error:
      name: error
      title: Error
      payload:
        $ref: '#/components/schemas/ErrorMessage'
    SyncResume:
      name: sync.resume
      title: Resume session and submit offline operations
      summary: Client reconnects and submits ordered durable operations created while offline.
      payload:
        $ref: '#/components/schemas/SyncResumeMessage'
      examples:
      - name: Reconnect with two pending offline operations
        payload:
          type: sync.resume
          requestId: req_sync_1
          sketchId: sk_123
          payload:
            clientId: browser_tab_01
            lastSeenVersion: 41
            lastAckedClientSeq: 120
            pendingOps:
            - clientOpId: browser_tab_01_121
              clientSeq: 121
              baseVersion: 41
              op:
                type: move_point
                pointId: p2
                target:
                  x: 120.0
                  y: 40.0
            - clientOpId: browser_tab_01_122
              clientSeq: 122
              baseVersion: 41
              op:
                type: set_dimension_value
                dimensionId: d1
                value: 80.0
    SyncResumeResult:
      name: sync.resume.result
      title: Resume result with missed patches and offline operation results
      summary: Backend response after replaying offline operations over the current canonical state through the C++ solver.
      payload:
        $ref: '#/components/schemas/SyncResumeResultMessage'
      examples:
      - name: Resume result with committed and rejected operations
        payload:
          type: sync.resume.result
          requestId: req_sync_1
          eventId: evt_sync_1
          sketchId: sk_123
          serverTime: '2026-05-26T12:00:00Z'
          payload:
            status: ok
            clientId: browser_tab_01
            fromVersion: 41
            currentVersion: 44
            missedPatches:
            - version: 42
              opId: op_remote_1
              actorUserId: usr_2
              actorUserName: alex
              patch:
                entities:
                  p5:
                    type: point
                    x: 20.0
                    y: 30.0
              authoritative: true
            opResults:
            - clientOpId: browser_tab_01_121
              clientSeq: 121
              status: committed
              committedVersion: 43
              patch:
                entities:
                  p2:
                    type: point
                    x: 120.0
                    y: 0.0
              solveStatus:
                status: under_constrained
                degreesOfFreedom: 3
                diagnostics: []
              authoritative: true
            - clientOpId: browser_tab_01_122
              clientSeq: 122
              status: rejected
              currentVersion: 43
              reason: solver_over_constrained
              diagnostics:
              - level: error
                code: CONSTRAINT_CONFLICT
                message: Dimension d1 conflicts with current geometry.
              authoritative: true
  schemas:
    RealtimeEnvelope:
      type: object
      required:
      - type
      - sketchId
      - payload
      properties:
        type:
          type: string
        requestId:
          type: string
        eventId:
          type: string
        sketchId:
          type: string
        clientTime:
          type: string
          format: date-time
        serverTime:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
    SessionJoinMessage:
      type: object
      required:
      - type
      - sketchId
      - payload
      properties:
        type:
          type: string
          enum:
          - session.join
        requestId:
          type: string
        sketchId:
          type: string
        clientTime:
          type: string
          format: date-time
        payload:
          $ref: '#/components/schemas/SessionJoinPayload'
    SessionJoinPayload:
      type: object
      required:
      - lastSeenVersion
      - clientId
      - supportedProtocolVersion
      properties:
        lastSeenVersion:
