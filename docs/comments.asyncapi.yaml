
asyncapi: 2.6.0
info:
  title: cccAD Comments Realtime API Add-on
  version: 0.4.0
  description: WebSocket events for threaded comments/tasks and client-visible system messages.
servers:
  production:
    url: /ws
    protocol: wss
  development:
    url: ws://localhost:8080/ws
    protocol: ws

defaultContentType: application/json

channels:
  workspaces/{workspaceId}/comments:
    parameters:
      workspaceId:
        description: Workspace UUID.
        schema:
          type: string
          format: uuid
    subscribe:
      summary: Receive realtime comment/task/system-message events for an opened workspace.
      operationId: subscribeWorkspaceCommentEvents
      message:
        oneOf:
          - $ref: '#/components/messages/CommentCreated'
          - $ref: '#/components/messages/CommentSystemMessageCreated'
          - $ref: '#/components/messages/CommentUpdated'
          - $ref: '#/components/messages/CommentDeleted'
          - $ref: '#/components/messages/CommentStatusChanged'
          - $ref: '#/components/messages/CommentAssigneesChanged'

components:
  messages:
    CommentCreated:
      name: comment.created
      payload:
        $ref: '#/components/schemas/CommentCreatedEvent'
    CommentSystemMessageCreated:
      name: comment.systemMessageCreated
      payload:
        $ref: '#/components/schemas/CommentSystemMessageCreatedEvent'
    CommentUpdated:
      name: comment.updated
      payload:
        $ref: '#/components/schemas/CommentUpdatedEvent'
    CommentDeleted:
      name: comment.deleted
      payload:
        $ref: '#/components/schemas/CommentDeletedEvent'
    CommentStatusChanged:
      name: comment.statusChanged
      payload:
        $ref: '#/components/schemas/CommentStatusChangedEvent'
    CommentAssigneesChanged:
      name: comment.assigneesChanged
      payload:
        $ref: '#/components/schemas/CommentAssigneesChangedEvent'

  schemas:
    EventEnvelopeBase:
      type: object
      required: [type, eventId, workspaceId, occurredAt, actorUserId]
      properties:
        type: { type: string }
        eventId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        occurredAt: { type: string, format: date-time }
        actorUserId: { type: string }

    CommentMessageType:
      type: string
      enum: [user, system]

    CommentSystemEventType:
      type: string
      enum:
        - comment_created
        - reply_created
        - body_edited
        - status_changed
        - assignees_changed
        - comment_deleted
        - comment_restored

    CommentTargetType:
      type: string
      enum:
        - workspace
        - sketch
        - sketch_entity
        - constraint
        - part
        - feature_3d
        - body
        - face
        - edge
        - vertex
        - profile
        - topology_ref_3d
        - representation_3d
        - simulation_job
        - simulation_result
        - mesh_entity

    CommentKind:
      type: string
      enum: [comment, task]

    CommentStatus:
      type: string
      enum: [open, in_progress, resolved, reopened, closed, rejected]

    JsonObject:
      type: object
      additionalProperties: true

    CadComment:
      type: object
      required:
        - id
        - workspaceId
        - messageType
        - threadRootId
        - replyDepth
        - targetType
        - targetId
        - kind
        - status
        - authorUserId
        - assigneeUserIds
        - body
        - eventPayload
        - metadata
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        sketchId: { type: string, format: uuid, nullable: true }
        partId: { type: string, format: uuid, nullable: true }
        parentCommentId: { type: string, format: uuid, nullable: true }
        threadRootId: { type: string, format: uuid }
        replyDepth: { type: integer, minimum: 0, maximum: 50 }
        messageType: { $ref: '#/components/schemas/CommentMessageType' }
        systemEventType:
          allOf:
            - $ref: '#/components/schemas/CommentSystemEventType'
          nullable: true
        eventPayload: { $ref: '#/components/schemas/JsonObject' }
        targetType: { $ref: '#/components/schemas/CommentTargetType' }
        targetId: { type: string }
        kind: { $ref: '#/components/schemas/CommentKind' }
        status: { $ref: '#/components/schemas/CommentStatus' }
        authorUserId: { type: string }
        assigneeUserIds:
          type: array
          items: { type: string }
        body: { type: string }
        sketchVersion: { type: integer, format: int64, nullable: true }
        partVersion: { type: integer, format: int64, nullable: true }
        anchor:
          allOf:
            - $ref: '#/components/schemas/JsonObject'
          nullable: true
        metadata: { $ref: '#/components/schemas/JsonObject' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    CommentCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.created]
            payload:
              type: object
              required: [comment]
              properties:
                comment: { $ref: '#/components/schemas/CadComment' }

    CommentSystemMessageCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.systemMessageCreated]
            payload:
              type: object
              required: [message]
              properties:
                message: { $ref: '#/components/schemas/CadComment' }

    CommentUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.updated]
            payload:
              type: object
              required: [commentId, comment]
              properties:
                commentId: { type: string, format: uuid }
                comment: { $ref: '#/components/schemas/CadComment' }

    CommentDeletedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.deleted]
            payload:
              type: object
              required: [commentId, threadRootId, deletedAt]
              properties:
                commentId: { type: string, format: uuid }
                threadRootId: { type: string, format: uuid }
                deletedAt: { type: string, format: date-time }

    CommentStatusChangedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.statusChanged]
            payload:
              type: object
              required: [commentId, threadRootId, oldStatus, newStatus, changedByUserId, changedAt, systemMessage]
              properties:
                commentId: { type: string, format: uuid }
                threadRootId: { type: string, format: uuid }
                oldStatus:
                  allOf:
                    - $ref: '#/components/schemas/CommentStatus'
                  nullable: true
                newStatus: { $ref: '#/components/schemas/CommentStatus' }
                changedByUserId: { type: string }
                changedAt: { type: string, format: date-time }
                reason: { type: string, nullable: true }
                systemMessage: { $ref: '#/components/schemas/CadComment' }

    CommentAssigneesChangedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.assigneesChanged]
            payload:
              type: object
              required: [commentId, threadRootId, assigneeUserIds, systemMessage]
              properties:
                commentId: { type: string, format: uuid }
                threadRootId: { type: string, format: uuid }
                assigneeUserIds:
                  type: array
                  items: { type: string }
                systemMessage: { $ref: '#/components/schemas/CadComment' }
