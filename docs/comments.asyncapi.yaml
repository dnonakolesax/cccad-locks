asyncapi: 2.6.0
info:
  title: cccAD Comments Realtime API Add-on
  version: 0.1.0
  description: WebSocket events for realtime propagation of comment/task changes.
servers:
  production:
    url: /ws
    protocol: wss
  development:
    url: ws://localhost:8080/ws
    protocol: ws

defaultContentType: application/json

channels:
  documents/{documentId}/comments:
    parameters:
      documentId:
        description: Document UUID.
        schema:
          type: string
          format: uuid
    subscribe:
      summary: Receive realtime comment/task events for an opened document.
      operationId: subscribeDocumentCommentEvents
      message:
        oneOf:
          - $ref: '#/components/messages/CommentCreated'
          - $ref: '#/components/messages/CommentUpdated'
          - $ref: '#/components/messages/CommentDeleted'
          - $ref: '#/components/messages/CommentStatusChanged'
          - $ref: '#/components/messages/CommentAssigneesChanged'

components:
  messages:
    CommentCreated:
      name: comment.created
      title: Comment created
      payload:
        $ref: '#/components/schemas/CommentCreatedEvent'

    CommentUpdated:
      name: comment.updated
      title: Comment body/anchor/metadata updated
      payload:
        $ref: '#/components/schemas/CommentUpdatedEvent'

    CommentDeleted:
      name: comment.deleted
      title: Comment soft-deleted
      payload:
        $ref: '#/components/schemas/CommentDeletedEvent'

    CommentStatusChanged:
      name: comment.statusChanged
      title: Comment status changed
      payload:
        $ref: '#/components/schemas/CommentStatusChangedEvent'

    CommentAssigneesChanged:
      name: comment.assigneesChanged
      title: Comment assignees changed
      payload:
        $ref: '#/components/schemas/CommentAssigneesChangedEvent'

  schemas:
    EventEnvelopeBase:
      type: object
      required:
        - type
        - eventId
        - workspaceId
        - documentId
        - occurredAt
        - actorId
      properties:
        type:
          type: string
        eventId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        actorId:
          type: string

    CommentTargetType:
      type: string
      enum:
        - document
        - part
        - sketch
        - sketch_entity
        - constraint
        - feature_3d
        - body
        - face
        - edge
        - vertex
        - profile
        - simulation_case
        - simulation_result
        - mesh_entity

    CommentKind:
      type: string
      enum:
        - comment
        - task

    CommentStatus:
      type: string
      enum:
        - open
        - in_progress
        - resolved
        - reopened
        - closed
        - rejected

    JsonObject:
      type: object
      additionalProperties: true

    CadComment:
      type: object
      required:
        - id
        - workspaceId
        - documentId
        - targetType
        - targetId
        - kind
        - status
        - authorId
        - assigneeIds
        - body
        - metadata
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        partId:
          type: string
          format: uuid
          nullable: true
        targetType:
          $ref: '#/components/schemas/CommentTargetType'
        targetId:
          type: string
        kind:
          $ref: '#/components/schemas/CommentKind'
        status:
          $ref: '#/components/schemas/CommentStatus'
        authorId:
          type: string
        assigneeIds:
          type: array
          items:
            type: string
        body:
          type: string
        documentVersion:
          type: integer
          minimum: 1
          nullable: true
        partVersion:
          type: integer
          minimum: 1
          nullable: true
        anchor:
          allOf:
            - $ref: '#/components/schemas/JsonObject'
          nullable: true
        metadata:
          $ref: '#/components/schemas/JsonObject'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true

    CommentCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required:
            - type
            - payload
          properties:
            type:
              type: string
              enum: [comment.created]
            payload:
              type: object
              required:
                - comment
              properties:
                comment:
                  $ref: '#/components/schemas/CadComment'

    CommentUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required:
            - type
            - payload
          properties:
            type:
              type: string
              enum: [comment.updated]
            payload:
              type: object
              required:
                - commentId
                - comment
              properties:
                commentId:
                  type: string
                  format: uuid
                comment:
                  $ref: '#/components/schemas/CadComment'

    CommentDeletedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required:
            - type
            - payload
          properties:
            type:
              type: string
              enum: [comment.deleted]
            payload:
              type: object
              required:
                - commentId
                - deletedAt
              properties:
                commentId:
                  type: string
                  format: uuid
                deletedAt:
                  type: string
                  format: date-time

    CommentStatusChangedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required:
            - type
            - payload
          properties:
            type:
              type: string
              enum: [comment.statusChanged]
            payload:
              type: object
              required:
                - commentId
                - oldStatus
                - newStatus
                - changedBy
                - changedAt
              properties:
                commentId:
                  type: string
                  format: uuid
                oldStatus:
                  allOf:
                    - $ref: '#/components/schemas/CommentStatus'
                  nullable: true
                newStatus:
                  $ref: '#/components/schemas/CommentStatus'
                changedBy:
                  type: string
                changedAt:
                  type: string
                  format: date-time
                reason:
                  type: string
                  nullable: true

    CommentAssigneesChangedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required:
            - type
            - payload
          properties:
            type:
              type: string
              enum: [comment.assigneesChanged]
            payload:
              type: object
              required:
                - commentId
                - assigneeIds
              properties:
                commentId:
                  type: string
                  format: uuid
                assigneeIds:
                  type: array
                  items:
                    type: string
