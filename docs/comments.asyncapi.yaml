asyncapi: 2.6.0
info:
  title: cccAD Comments Realtime API Add-on
  version: 0.2.0
  description: WebSocket events for realtime propagation of comment/task changes, adapted to workspace-scoped schema.
servers:
  production:
    url: /ws
    protocol: wss
  development:
    url: ws://localhost:8080/ws
    protocol: ws

defaultContentType: application/json

channels:
  /api/v1/sketches/realtime/ws/documents/{documentId}/comments:
    parameters:
      documentId:
        description: Document/sketch UUID whose comment events are streamed.
        schema:
          type: string
          format: uuid
    subscribe:
      summary: Receive realtime comment/task events for an opened document.
      operationId: subscribeDocumentCommentEvents
      message:
        oneOf:
          - $ref: '#/components/messages/CommentCreated'
          - $ref: '#/components/messages/CommentUpdated'
          - $ref: '#/components/messages/CommentDeleted'
          - $ref: '#/components/messages/CommentStatusChanged'
          - $ref: '#/components/messages/CommentAssigneesChanged'

components:
  messages:
    CommentCreated:
      name: comment.created
      payload:
        $ref: '#/components/schemas/CommentCreatedEvent'
    CommentUpdated:
      name: comment.updated
      payload:
        $ref: '#/components/schemas/CommentUpdatedEvent'
    CommentDeleted:
      name: comment.deleted
      payload:
        $ref: '#/components/schemas/CommentDeletedEvent'
    CommentStatusChanged:
      name: comment.statusChanged
      payload:
        $ref: '#/components/schemas/CommentStatusChangedEvent'
    CommentAssigneesChanged:
      name: comment.assigneesChanged
      payload:
        $ref: '#/components/schemas/CommentAssigneesChangedEvent'

  schemas:
    EventEnvelopeBase:
      type: object
      required:
        - type
        - eventId
        - workspaceId
        - occurredAt
        - actorUserId
      properties:
        type:
          type: string
        eventId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        actorUserId:
          type: string

    CommentTargetType:
      type: string
      enum:
        - workspace
        - sketch
        - sketch_entity
        - constraint
        - part
        - feature_3d
        - body
        - face
        - edge
        - vertex
        - profile
        - topology_ref_3d
        - representation_3d
        - simulation_job
        - simulation_result
        - mesh_entity

    CommentKind:
      type: string
      enum: [comment, task]

    CommentStatus:
      type: string
      enum: [open, in_progress, resolved, reopened, closed, rejected]

    JsonObject:
      type: object
      additionalProperties: true

    CadComment:
      type: object
      required:
        - id
        - workspaceId
        - targetType
        - targetId
        - kind
        - status
        - authorUserId
        - assigneeUserIds
        - body
        - metadata
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        sketchId:
          type: string
          format: uuid
          nullable: true
        partId:
          type: string
          format: uuid
          nullable: true
        targetType:
          $ref: '#/components/schemas/CommentTargetType'
        targetId:
          type: string
        kind:
          $ref: '#/components/schemas/CommentKind'
        status:
          $ref: '#/components/schemas/CommentStatus'
        authorUserId:
          type: string
        assigneeUserIds:
          type: array
          items:
            type: string
        body:
          type: string
        sketchVersion:
          type: integer
          format: int64
          nullable: true
        partVersion:
          type: integer
          format: int64
          nullable: true
        anchor:
          allOf:
            - $ref: '#/components/schemas/JsonObject'
          nullable: true
        metadata:
          $ref: '#/components/schemas/JsonObject'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true

    CommentCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.created]
            payload:
              type: object
              required: [comment]
              properties:
                comment:
                  $ref: '#/components/schemas/CadComment'

    CommentUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.updated]
            payload:
              type: object
              required: [commentId, comment]
              properties:
                commentId:
                  type: string
                  format: uuid
                comment:
                  $ref: '#/components/schemas/CadComment'

    CommentDeletedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.deleted]
            payload:
              type: object
              required: [commentId, deletedAt]
              properties:
                commentId:
                  type: string
                  format: uuid
                deletedAt:
                  type: string
                  format: date-time

    CommentStatusChangedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.statusChanged]
            payload:
              type: object
              required:
                - commentId
                - oldStatus
                - newStatus
                - changedByUserId
                - changedAt
              properties:
                commentId:
                  type: string
                  format: uuid
                oldStatus:
                  allOf:
                    - $ref: '#/components/schemas/CommentStatus'
                  nullable: true
                newStatus:
                  $ref: '#/components/schemas/CommentStatus'
                changedByUserId:
                  type: string
                changedAt:
                  type: string
                  format: date-time
                reason:
                  type: string
                  nullable: true

    CommentAssigneesChangedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeBase'
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [comment.assigneesChanged]
            payload:
              type: object
              required: [commentId, assigneeUserIds]
              properties:
                commentId:
                  type: string
                  format: uuid
                assigneeUserIds:
                  type: array
                  items:
                    type: string
